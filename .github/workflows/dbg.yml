name: dbg
on: { workflow_dispatch: {} }
permissions:
  id-token: write
  contents: read
jobs:
  dbg:
    runs-on: ubuntu-22.04
    steps:
      - run: |
          echo '<!doctype html><h1>dbg</h1>' > r.html
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=code-ranker-reports" | jq -r .value)
          echo "token length: ${#TOKEN}"
          echo "=== raw upload response ==="
          curl -sS -w "\n---HTTP %{http_code}---\n" -X POST https://api.code-ranker.com/upload \
            -H "Authorization: Bearer $TOKEN" \
            -F "pr=1" -F "violations=0" -F "report=@r.html;type=text/html"
