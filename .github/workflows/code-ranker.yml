# .github/workflows/code-ranker.yml
#
# Thin caller stub. This is the EXACT file the code-ranker onboarding PR adds for
# you -- all real logic lives in the reusable workflow, which is pinned to an
# immutable commit SHA (supply-chain hardening) with a trailing "# v1" so
# Dependabot can bump it. You never edit it by hand.
#
# code-ranker v5 analyzes ALL languages in one pass, so this is a single job: one
# report + one check for the whole repo. The PR comment is posted/updated by the
# code-ranker GitHub App (backend), not by this workflow.
#
# No secrets are required: identity is proven via keyless OIDC.
name: code-ranker
on:
  pull_request:
  push:                     # any branch — the stat-diff baseline works everywhere
jobs:
  code-ranker:
    # Pinned to an immutable commit SHA (supply-chain hardening); the trailing
    # '# v1' comment lets Dependabot bump it and marks the tracked version.
    uses: code-ranker-com/actions/.github/workflows/report.yml@485febd51d1cf0f666e262de6e37e1d2e3f6d7f5  # v1
    # with:                 # all optional; defaults shown
    #   do_report: true     # upload the HTML report (the View-report button)
    #   do_check: true      # red the job on violations (false = advisory only)
    #   pr_comment: true    # send the comment body on upload, for the GitHub App to post
    #   sarif: true         # upload SARIF to code scanning (inline PR alerts)
    #   runs_on: ubuntu-22.04
    permissions:
      id-token: write          # OIDC, keyless -- no secret needed
      contents: read           # checkout your code for analysis
      security-events: write   # upload SARIF to code scanning (inline PR alerts)

# -----------------------------------------------------------------------------
# do_check / branch protection
# -----------------------------------------------------------------------------
# By default the lint gate runs: the job goes RED when code-ranker finds
# violations. That shows a failing check on the PR but does NOT block merging
# unless you mark `code-ranker` as a REQUIRED status check in your branch
# protection / ruleset. Pass `do_check: false` to keep it advisory-only.
#
# -----------------------------------------------------------------------------
# PR comments, incl. fork PRs
# -----------------------------------------------------------------------------
# The PR comment is posted/updated by the code-ranker GitHub App, not by this
# workflow -- that's why no `pull-requests: write` permission is requested
# above. Same-repo PRs are commented on as soon as the /upload call lands; fork
# PRs are handled automatically via a webhook on the backend (it downloads the
# report artifact this workflow publishes for them) -- no extra stub, no extra
# permissions, and NEVER `pull_request_target`.
