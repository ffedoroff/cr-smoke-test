# SMOKE TEST stub — points at the feature branch of code-ranker-ci (not @v1),
# so this exercises the new language-parameterized report+check workflow before
# the v1 tag is moved. Mirrors what the onboarding PR would generate.
name: code-ranker
on:
  pull_request:
  push:
jobs:
  code-ranker:
    if: github.event_name == 'pull_request' || github.ref_name == github.event.repository.default_branch
    strategy:
      fail-fast: false
      matrix:
        include:
          - { language: python,     do_report: true, do_check: true }
          - { language: rust,       do_report: true, do_check: true }
          - { language: javascript, do_report: true, do_check: true }
          - { language: markdown,   do_report: true, do_check: false }   # advisory-only, чтобы проверить per-language флаг
    uses: ffedoroff/code-ranker-ci/.github/workflows/report.yml@feat/per-language-report-check
    with:
      language: ${{ matrix.language }}
      do_report: ${{ matrix.do_report }}
      do_check: ${{ matrix.do_check }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
